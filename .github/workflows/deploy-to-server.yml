name: Deploy frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**/*"

env:
  NODE_VERSION: 24

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build project
        run: yarn build

      - name: Copy dist to server via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          source: "dist/*"
          target: "/var/www/html/"
          strip_components: 1

      - name: Send Telegram success notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            👤✅ rvchan frontend deployment successful

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.event.head_commit.author.name }}
            Message: ${{ github.event.head_commit.message }}

            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Telegram failure notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            👤❌ rvchan frontend deployment failed

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.event.head_commit.author.name }}
            Message: ${{ github.event.head_commit.message }}
            Error: Check workflow logs for details.

            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
